
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCREAM MOVIE 7 - 2026</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:black;
    color:white;
    text-align:center;
}

h1{
    color:red;
    margin-top:30px;
}

.sub{
    font-size:18px;
    margin-bottom:20px;
}

.botones{
    margin:20px;
}

button{
    padding:12px 20px;
    margin:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

.whatsapp{
    background:#25D366;
    color:white;
}

.ver{
    background:red;
    color:white;
}

.poster{
    width:300px;
    margin-top:20px;
    border-radius:10px;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    z-index:1;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
}

.modal-content{
    background:#111;
    padding:20px;
    margin:15% auto;
    width:90%;
    max-width:400px;
    border-radius:10px;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
    border-radius:5px;
    border:none;
}

.error{
    color:red;
    display:none;
}

.progress{
    width:100%;
    background:#333;
    border-radius:5px;
    display:none;
    margin-top:15px;
}

.bar{
    height:20px;
    width:0%;
    background:red;
    border-radius:5px;
    text-align:center;
    font-size:12px;
}

.descargar{
    display:none;
    background:green;
    color:white;
    margin-top:15px;
}
</style>
</head>

<body>

<h1>SCREAM MOVIE 7 - 2026</h1>
<div class="sub">TRAÍDO POR EDER STEVEN VENTAS</div>

<div class="botones">
    <button class="whatsapp" onclick="irWhats()">WHATSAPP</button>
    <button class="ver" onclick="abrirModal()">VER PELÍCULA</button>
</div>

<img src="poster.jpg" class="poster">

<!-- MODAL LOGIN -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Ingresa tu usuario y contraseña</h3>

        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">

        <button onclick="verPassword()">VER CONTRASEÑA</button>
        <button onclick="login()">INICIAR SESIÓN</button>

        <br><br>
        <button onclick="comprarAcceso()">COMPRAR ACCESO</button>

        <div class="error" id="error">Usuario o contraseña incorrecta</div>

        <div class="progress" id="progress">
            <div class="bar" id="bar">0%</div>
        </div>

        <button class="descargar" id="descargar" onclick="descargarTrailer()">
            DESCARGAR TRAILER
        </button>
    </div>
</div>

<script>
function irWhats(){
    window.open("https://wa.me/51921114873", "_blank");
}

function comprarAcceso(){
    window.open("https://wa.me/51921114873?text=Hola%20quiero%20comprar%20acceso%20al%20trailer", "_blank");
}

function abrirModal(){
    document.getElementById("modal").style.display="block";
}

function verPassword(){
    var x = document.getElementById("password");
    if(x.type==="password"){
        x.type="text";
    }else{
        x.type="password";
    }
}

function login(){
    var user = document.getElementById("usuario").value;
    var pass = document.getElementById("password").value;

    if(user==="Cliente%078F" && pass==="suporttSteven@@"){
        document.getElementById("error").style.display="none";
        iniciarCarga();
    }else{
        document.getElementById("error").style.display="block";
    }
}

function iniciarCarga(){
    var progress = document.getElementById("progress");
    var bar = document.getElementById("bar");
    progress.style.display="block";

    var width=0;
    var intervalo = setInterval(function(){
        if(width>=100){
            clearInterval(intervalo);
            document.getElementById("descargar").style.display="inline-block";
        }else{
            width++;
            bar.style.width=width+"%";
            bar.innerHTML=width+"%";
        }
    },30);
}

function descargarTrailer(){
    window.location.href="trailer.mp4";
}
</script>

</body>
</html>
